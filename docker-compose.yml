services:
  # 1. БД MySQL
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: pass
    ports:
      - '3308:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-ppass"]
      interval: 5s
      timeout: 5s
      retries: 20

  # 2. Эмулятор платежей
  gate-simulator:
    image: node:24-alpine
    container_name: gate_simulator
    working_dir: /app
    volumes:
      - ./gate-simulator:/app
    ports:
      - '9999:9999'
    command: sh -c "npm install && npm start"

  # 3. Основное приложение aqa-shop
  aqa-shop:
    image: eclipse-temurin:11-jre-alpine
    container_name: aqa_shop
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - '8080:8080'
    command: java -jar aqa-shop.jar
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  db_data: