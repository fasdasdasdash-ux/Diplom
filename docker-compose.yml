services:
  # 1. БД MySQL
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: pass
    ports:
      - '3308:3306'
    volumes:
      - db_data:/var/lib/mysql

  # 2. Эмулятор платежей
  gate-simulator:
    image: node:24-alpine
    container_name: gate_simulator
    working_dir: /app
    volumes:
      - ./gate-simulator:/app
    ports:
      - '9999:9999'
    command: sh -c "npm install && npm start"

  # 3. Основное приложение aqa-shop
  aqa-shop:
    image: eclipse-temurin:11-jre-alpine
    container_name: aqa_shop
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/app?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: pass
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQL8Dialect
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_PAYMENT_GATE_URL: http://gate-simulator:9999/payment
      SPRING_CREDIT_GATE_URL: http://gate-simulator:9999/credit
    command: java -jar aqa-shop.jar
    depends_on:
      - mysql

volumes:
  db_data: